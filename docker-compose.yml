version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: docpres
      POSTGRES_USER: docpres
      POSTGRES_PASSWORD: docpres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://docpres:docpres@db:5432/docpres?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-prod
    ports:
      - "3000:3000"
    # If you need file uploads or other mounted storage, add volumes here
    # volumes:
    #   - ./uploads:/app/uploads

volumes:
  db_data:

